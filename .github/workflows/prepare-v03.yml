name: Prepare UI SFX v0.3.0

on:
  push:
    branches: [release/audio-quality-v03]

permissions:
  contents: write

jobs:
  generate:
    if: github.event.head_commit.message == 'Prepare UI SFX v0.3.0 release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: npm
      - uses: FedericoCarboni/setup-ffmpeg@v3
      - run: npm ci
      - run: npm run check
      - name: Commit verified generated assets
        run: |
          rm .github/workflows/prepare-v03.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "Expected generated release changes"; exit 1; }
          git commit -m "Regenerate v0.3.0 audio assets"
          git push
