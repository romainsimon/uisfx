name: Publish npm

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          package_version=$(node -p "require('./packages/uisfx/package.json').version")
          if [ "$GITHUB_REF_NAME" != "v$package_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version v$package_version"
            exit 1
          fi
      - run: npm ci
      - run: npm run build --workspace=uisfx
      - run: npm publish --workspace=uisfx --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
