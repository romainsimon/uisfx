name: Publish npm

on:
  workflow_dispatch:
  push:
    branches: [release/npm]
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip publish]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Enable npm trusted publishing
        run: npm install --global npm@11.5.1
      - name: Read package version
        id: package
        run: |
          package_version=$(node -p "require('./packages/uisfx/package.json').version")
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [ "$GITHUB_REF_NAME" != "v${{ steps.package.outputs.version }}" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version v${{ steps.package.outputs.version }}"
            exit 1
          fi
      - run: npm ci
      - run: npm run build --workspace=uisfx
      - name: Check whether this version already exists
        id: registry
        run: |
          if npm view "uisfx@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish package
        id: publish
        if: steps.registry.outputs.exists != 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          npm publish --workspace=uisfx --access public --provenance 2>&1 | tee /tmp/npm-publish.log
      - name: Record verified release
        if: always() && github.ref == 'refs/heads/release/npm'
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          REGISTRY_EXISTS: ${{ steps.registry.outputs.exists }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
          RELEASE_RESULT: ${{ steps.registry.outputs.exists == 'true' && 'already-published' || (steps.publish.outcome == 'success' && 'published' || 'failed') }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs'

          let publishLog = ''
          try {
            publishLog = readFileSync('/tmp/npm-publish.log', 'utf8')
          } catch {
            // No publish command ran when the version already existed.
          }

          const failureCategory =
            /ENEEDAUTH|need auth|not logged in/i.test(publishLog) ? 'authentication-required'
              : /EOTP|one-time password|two-factor/i.test(publishLog) ? 'two-factor-required'
                : /OIDC|trusted publish|provenance/i.test(publishLog) ? 'trusted-publishing'
                  : publishLog ? 'publish-command-failed' : 'pre-publish-step-failed'

          const record = {
            package: 'uisfx',
            version: process.env.PACKAGE_VERSION,
            sourceSha: process.env.GITHUB_SHA,
            result: process.env.RELEASE_RESULT,
            registryExists: process.env.REGISTRY_EXISTS || null,
            publishOutcome: process.env.PUBLISH_OUTCOME || null,
            failureCategory: process.env.RELEASE_RESULT === 'failed' ? failureCategory : null,
            failureCode: publishLog.match(/npm error code\\s+([A-Z0-9]+)/i)?.[1] ?? null,
            verifiedAt: new Date().toISOString(),
          }

          writeFileSync('.github/npm-release-status.json', `${JSON.stringify(record, null, 2)}\n`)
          NODE
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/npm-release-status.json
          git commit -m "chore: record npm release [skip publish]"
          git push

      - name: Fail unsuccessful publication
        if: steps.registry.outputs.exists != 'true' && steps.publish.outcome != 'success'
        run: exit 1
