name: Update sponsors in README

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sponsors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh sponsor logos from the public sponsor feed
        run: node --import tsx scripts/update-sponsors-readme.ts
      - name: Commit sponsor changes
        run: |
          if git diff --quiet -- README.md; then
            echo "Sponsor wall is current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(sponsors): refresh README"
          git push
